<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
    .favicon {
      width: 512px;
      height: 512px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 transparent;
    }

    .favicon svg {
      width: 320px;
      height: 320px;
    }
  </style>
</head>
<body>
  <div class="favicon">
    <svg viewBox="0 0 100 100" fill="none">
      <path d="M20 35 L50 55 L80 35 L80 70 L20 70 Z" fill="white" opacity="0.9"/>
      <path d="M20 30 L50 50 L80 30" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
